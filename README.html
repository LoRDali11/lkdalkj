<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lord Academy - منصة الامتحانات</title>
    <!-- استدعاء خطوط جوجل للغة العربية لإعطاء مظهر احترافي -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           إعدادات عامة وألوان التصميم (Dark Royal)
           ========================================= */
        :root {
            --bg-color: #050505; /* أسود غامق جداً */
            --container-bg: #111111; /* أسود أفتح قليلاً للحاويات */
            --gold: #d4af37; /* ذهبي ملكي */
            --gold-hover: #b5952f;
            --text-light: #ffffff;
            --text-muted: #aaaaaa;
            --correct-color: #2ecc71; /* أخضر للإجابة الصحيحة */
            --wrong-color: #e74c3c; /* أحمر للإجابة الخاطئة */
            --border-color: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* =========================================
           الهيدر والشعار
           ========================================= */
        header {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
        }

        .logo {
            font-family: 'Cairo', sans-serif;
            color: var(--gold);
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            margin-bottom: 5px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .subtitle span {
            color: var(--gold);
        }

        /* =========================================
           الحاويات الأساسية للشاشات المختلفة
           ========================================= */
        .screen-container {
            background-color: var(--container-bg);
            width: 100%;
            max-width: 800px;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            border-top: 4px solid var(--gold);
            display: none; /* يتم إظهارها عن طريق جافاسكريبت */
            animation: fadeIn 0.5s ease-in-out;
        }

        .screen-container.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* =========================================
           شاشة البداية
           ========================================= */
        .start-screen {
            text-align: center;
        }

        .start-screen h2 {
            color: var(--gold);
            margin-bottom: 20px;
            font-size: 2rem;
        }

        .start-screen p {
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .settings-group {
            background-color: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            display: inline-block;
            border: 1px solid var(--border-color);
        }

        .settings-group label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .settings-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--gold);
        }

        .btn {
            background-color: var(--gold);
            color: var(--bg-color);
            border: none;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: var(--gold-hover);
            transform: scale(1.05);
        }

        /* =========================================
           شاشة الامتحان
           ========================================= */
        .exam-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .question-counter {
            color: var(--gold);
            font-weight: bold;
            font-size: 1.2rem;
        }

        .timer {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-light);
            background: #222;
            padding: 5px 15px;
            border-radius: 5px;
            border: 1px solid var(--border-color);
        }

        .timer.danger {
            color: var(--wrong-color);
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.5; }
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background-color: #222;
            border-radius: 4px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--gold);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-text {
            font-size: 1.4rem;
            margin-bottom: 25px;
            line-height: 1.8;
            color: var(--text-light);
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .option-btn {
            background-color: #1a1a1a;
            color: var(--text-light);
            border: 2px solid var(--border-color);
            padding: 15px 20px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            text-align: right;
            transition: all 0.3s;
            position: relative;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--gold);
            background-color: #222;
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        /* أصناف الإجابات */
        .option-btn.correct {
            background-color: rgba(46, 204, 113, 0.1);
            border-color: var(--correct-color);
            color: var(--correct-color);
            font-weight: bold;
        }

        .option-btn.wrong {
            background-color: rgba(231, 76, 60, 0.1);
            border-color: var(--wrong-color);
            color: var(--wrong-color);
        }

        .explanation-box {
            background-color: rgba(212, 175, 55, 0.05);
            border-right: 4px solid var(--gold);
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            animation: fadeIn 0.5s;
        }

        .explanation-box h4 {
            color: var(--gold);
            margin-bottom: 10px;
        }

        .next-btn-container {
            text-align: left; /* لزر التالي في اليسار */
        }

        #next-btn {
            display: none; /* يظهر بعد الإجابة */
        }

        /* =========================================
           شاشة النتيجة والمراجعة
           ========================================= */
        .result-screen {
            text-align: center;
        }

        .result-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 8px solid var(--gold);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0 auto 30px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .result-circle .score {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--gold);
        }

        .result-circle .percentage {
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        .result-message {
            font-size: 1.5rem;
            margin-bottom: 30px;
        }

        .review-list {
            text-align: right;
            margin-top: 30px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 10px;
        }

        /* تخصيص شريط التمرير (Scrollbar) */
        .review-list::-webkit-scrollbar {
            width: 8px;
        }
        .review-list::-webkit-scrollbar-track {
            background: #111; 
        }
        .review-list::-webkit-scrollbar-thumb {
            background: var(--gold); 
            border-radius: 4px;
        }

        .review-item {
            background-color: #1a1a1a;
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .review-item.correct-ans {
            border-right: 4px solid var(--correct-color);
        }

        .review-item.wrong-ans {
            border-right: 4px solid var(--wrong-color);
        }

        .review-question {
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--gold);
        }

        .review-details p {
            margin-bottom: 5px;
            font-size: 0.95rem;
        }

        /* =========================================
           التجاوب مع الشاشات (Responsive)
           ========================================= */
        @media (max-width: 600px) {
            .logo { font-size: 2.5rem; }
            .screen-container { padding: 20px; }
            .question-text { font-size: 1.2rem; }
            .option-btn { font-size: 1rem; padding: 12px; }
        }
    </style>
</head>
<body>

    <!-- الهيدر الرئيسي -->
    <header>
        <h1 class="logo">Lord Academy</h1>
        <h2 class="subtitle">إعداد <span>علي جلال</span></h2>
    </header>

    <!-- شاشة الامتحان -->
    <div id="exam-screen" class="screen-container active">
        <div class="exam-header">
            <div class="question-counter">سؤال <span id="current-q-num">1</span> / 60</div>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div class="question-text" id="question-text">
            <!-- سيتم حقن نص السؤال هنا -->
        </div>

        <div class="options-grid" id="options-container">
            <!-- سيتم حقن الخيارات هنا -->
        </div>

        <div class="explanation-box" id="explanation-box">
            <h4>شرح الإجابة:</h4>
            <p id="explanation-text"></p>
        </div>

        <div class="next-btn-container">
            <button class="btn" id="next-btn" onclick="nextQuestion()">السؤال التالي</button>
        </div>
    </div>

    <!-- شاشة النتيجة -->
    <div id="result-screen" class="screen-container">
        <h2>انتهى الامتحان!</h2>
        
        <div class="result-circle">
            <div class="score"><span id="final-score">0</span>/60</div>
            <div class="percentage" id="final-percentage">0%</div>
        </div>

        <div class="result-message" id="result-message">
            <!-- رسالة التقييم -->
        </div>

        <button class="btn" onclick="showReview()">مراجعة الإجابات والشرح</button>
        <button class="btn" style="background-color: #333; margin-right: 10px;" onclick="location.reload()">امتحان جديد</button>

        <div class="review-list" id="review-list" style="display: none;">
            <!-- سيتم حقن المراجعة هنا -->
        </div>
    </div>

    <!-- =========================================
         سكريبت جافاسكريبت للتحكم بالمنطق
         ========================================= -->
    <script>
        // منع المستخدم من إعادة تحميل الصفحة عن طريق الخطأ أثناء الامتحان
        window.addEventListener('beforeunload', function (e) {
            if(document.getElementById('exam-screen').classList.contains('active')){
                e.preventDefault();
                e.returnValue = '';
            }
        });

        // ---------------------------------------------------------
        // قاعدة بيانات الأسئلة (60 سؤال: 30 اختيارات + 30 صح/خطأ)
        // مستوحاة حرفياً من محتوى ملف PDF المرفق
        // ---------------------------------------------------------
        const questionsDB = [
            // === أولاً: 30 سؤال اختيار من متعدد ===
            {
                type: "mcq",
                question: "وفقاً للنص، ما هو الدور الإيجابي الذي تلعبه اللغة في علاقتها بالفكر؟",
                options: ["تجميد الفكر في قوالب ثابتة", "توجيه الفكر وإعادة تشكيل علاقاته", "تدمير البناء المنطقي للفكر", "لا يوجد علاقة بين اللغة والفكر"],
                correctIndex: 1,
                explanation: "كما ورد في الملف، للغة دور إيجابي في توجيه الفكر، وللفكر فعالية في توجيه اللغة وإعادة تشكيل علاقاتها."
            },
            {
                type: "mcq",
                question: "تُعد اللغة أهم مكونات العمل الشعري لأنها:",
                options: ["مجرد أصوات موسيقية لا معنى لها", "الأداة والمادة التي يعبر بها الشاعر عن أفكاره ويشكل أزمنته وموسيقاه", "وسيلة للتواصل الاجتماعي البسيط فقط", "قالب جامد يحجم خيال الشاعر"],
                correctIndex: 1,
                explanation: "اللغة في الشعر هي أهم مكونات العمل الشعري، فهي الأداة والمادة التي يعبر بها الشاعر عن أفكاره، ويشكل منها أزمنته وأمكنته وموسيقاه."
            },
            {
                type: "mcq",
                question: "من سمات لغة الشعر الأندلسي (كما في شعر ابن اللبانة):",
                options: ["الغموض والتعقيد اللفظي", "استخدام الألفاظ الغريبة والمعقدة", "سهولة الألفاظ وسلاسة التراكيب", "الاعتماد الكلي على المحسنات البديعية المتكلفة"],
                correctIndex: 2,
                explanation: "اتسمت لغة الشعر الأندلسي بسهولة الألفاظ والبعد عن الغريب المعقد وسلاسة التراكيب، بسبب سهولة طباعهم ورقة طبيعتهم وعدم التكلف."
            },
            {
                type: "mcq",
                question: "أي المستويات اللغوية الآتية يختص بدراسة مخارج الحروف وصفاتها والنبر؟",
                options: ["المستوى النحوي", "المستوى المعجمي", "المستوى الصوتي", "المستوى الصرفي"],
                correctIndex: 2,
                explanation: "المستوى الصوتي هو الذي يدرس مخارج الحروف وصفاتها والنبر."
            },
            {
                type: "mcq",
                question: "دراسة حروف الزيادة (سألتمونيها) والحروف المحذوفة وأثر الوزن على الدلالة يندرج تحت:",
                options: ["المستوى البياني", "المستوى الصرفي", "المستوى النظمي", "المستوى النحوي"],
                correctIndex: 1,
                explanation: "المستوى الصرفي يدرس مستوى الكلمة، وزنها، حروف الزيادة (سألتمونيها)، والحروف المحذوفة."
            },
            {
                type: "mcq",
                question: "المستوى البياني في دراسة اللغة يهتم بدراسة:",
                options: ["علامات الترقيم وقواعد الإملاء", "التطور الطارئ على دلالات الكلمات", "الجملة الاسمية والفعلية والتقديم والتأخير", "الخيال والصورة (التشبيه، الاستعارة، الكناية، المجاز)"],
                correctIndex: 3,
                explanation: "المستوى البياني يدرس الخيال والصورة مثل التشبيه والاستعارة والكناية والمجاز المرسل والعقلي."
            },
            {
                type: "mcq",
                question: "المستوى الذي يُعد خاصاً بالشعر ويدرس موسيقى الشعر الداخلية والخارجية هو:",
                options: ["المستوى الكتابي", "المستوى النظمي", "المستوى الدلالي", "المستوى الصوتي"],
                correctIndex: 1,
                explanation: "المستوى النظمي هو مستوى خاص بالشعر، يدرس موسيقى الشعر الداخلية والخارجية."
            },
            {
                type: "mcq",
                question: "النص الأدبي بمفهومه الخاص يستبعد نصوصاً معينة، أي من التالي يُستبعد من النص الأدبي؟",

                explanation: "النص الأدبي مقصور على الأدب بمفهومه الخاص، ويستبعد نصوص التاريخ، الجغرافيا، العلوم، والنحو."
            },
            {
                type: "mcq",

                options: ["الثقافة الواسعة", "الدعوة إلى الطعام (دلالة أخلاقية مرتبطة بالكرم)", "الكلام الجيد المنظوم والمنثور", "الجانب التعليمي والتهذيبي لأبناء الملوك"],
                correctIndex: 1,
                explanation: "في العصر الجاهلي، كان معناها حسياً يعني (الدعوة إلى الطعام) وهي دلالة أخلاقية تهذيبية مرتبطة بالكرم والضيافة."

            {

            },
            {
                type: "mcq",
                question: "من هو أول من استخدم كلمة (أدب) كـ 'حرفة' في قوله (حرفة الأدب آفة الأدباء)؟",
                options: ["المتنبي", "الخليل بن أحمد الفراهيدي", "ابن رشيق", "ابن خلدون"],
                correctIndex: 1,
                explanation: "الخليل بن أحمد الفراهيدي في العصر العباسي هو أول من استخدم كلمة أدب كـ 'حرفة'."
            },
            {
                type: "mcq",
                question: "أي التعريفات الآتية للأدب أُخذ عليه أنه (واسع فضفاض قد يشمل الفلسفة)؟",
                options: ["صياغة فنية لتجربة بشرية", "تعبير عن الحياة مادته اللغة", "كافة الآثار اللغوية التي تثير انفعالات عاطفية أو أحاسيس جمالية", "مجموع الكلام الجيد نثراً وشعراً"],
                correctIndex: 2,
                explanation: "التعريف الأول (كافة الآثار اللغوية التي تثير انفعالات عاطفية) مأخذه أنه واسع فضفاض قد يشمل الفلسفة."
            },
            {
                type: "mcq",
                question: "كيف عرّف كارل بروكلمان الأدب؟",
                options: ["كل ما صاغه الإنسان في قالب لغوي ليوصله إلى الذاكرة", "تعبير عن الحياة مادته اللغة", "صياغة فنية لتجربة بشرية", "تجسيد الخيال في صورة واقعية"],
                correctIndex: 0,
                explanation: "تعريف كارل بروكلمان للأدب: كل ما صاغه الإنسان في قالب لغوي ليوصله إلى الذاكرة."
            },
            {
                type: "mcq",
                question: "التقسيم الزمني للأدب مستمد من الدراسات الغربية ويرتبط بـ:",
                options: ["تطور اللغة العربية", "العصور السياسية", "الأجناس الأدبية", "المدارس النقدية"],
                correctIndex: 1,
                explanation: "التقسيم الزمني (التاريخي) مستمد من الدراسات الغربية، ويرتبط بالعصور السياسية (جاهلي، إسلامي، أموي... الخ)."
            },
            {
                type: "mcq",
                question: "يبدأ العصر الإسلامي في التقسيم التاريخي للأدب من البعثة النبوية وينتهي بـ:",
                options: ["سقوط الدولة الأموية (132هـ)", "مقتل علي بن أبي طالب (40هـ)", "سقوط بغداد (656هـ)", "الحملة الفرنسية"],
                correctIndex: 1,
                explanation: "العصر الإسلامي يمتد من البعثة إلى مقتل علي بن أبي طالب (40هـ)."
            },
            {
                type: "mcq",
                question: "يُعرّف الشعر اصطلاحاً بأنه القول المؤلف من أمور تخيلية يقصد بها:",
                options: ["الترغيب أو الترهيب", "نقل الحقائق العلمية", "سرد القصص التاريخية", "توضيح القواعد النحوية"],
                correctIndex: 0,
                explanation: "اصطلاحاً الشعر هو: القول المؤلف من أمور تخيلية، يقصد بها الترغيب (الخمر ياقوتة سيالة) أو الترهيب (العسل قيء النحل)."
            },
            {

            const progressPercent = ((index) / questionsDB.length) * 100;
            document.getElementById('progress-bar').style.width = progressPercent + '%';

            // إنشاء أزرار الخيارات
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(i, btn);
                optionsContainer.appendChild(btn);
            });
        }

        // فحص الإجابة
        function checkAnswer(selectedIndex, btnElement) {
            const q = questionsDB[currentQuestionIndex];
            const optionsContainer = document.getElementById('options-container');
            const buttons = optionsContainer.getElementsByClassName('option-btn');
            const explanationBox = document.getElementById('explanation-box');
            const explanationText = document.getElementById('explanation-text');
            const nextBtn = document.getElementById('next-btn');

            // إيقاف تفاعل كل الأزرار بعد الاختيار
            for (let i = 0; i < buttons.length; i++) {
                buttons[i].disabled = true;
            }

            // حفظ اختيار المستخدم
            userAnswers[currentQuestionIndex] = selectedIndex;

            // التحقق من الإجابة
            if (selectedIndex === q.correctIndex) {
                btnElement.classList.add('correct');
                score++;
            } else {
                btnElement.classList.add('wrong');
                // تظليل الإجابة الصحيحة
                buttons[q.correctIndex].classList.add('correct');
            }

            // عرض الشرح
            explanationText.innerText = q.explanation;
            explanationBox.style.display = 'block';

            // إظهار زر التالي
            nextBtn.style.display = 'inline-block';
            if (currentQuestionIndex === questionsDB.length - 1) {
                nextBtn.innerText = "إنهاء الامتحان وعرض النتيجة";
            }
        }

        // الانتقال للسؤال التالي
        function nextQuestion() {
            currentQuestionIndex++;
            
            if (currentQuestionIndex < questionsDB.length) {
                loadQuestion(currentQuestionIndex);
            } else {
                endExam();
            }
        }

        // إنهاء الامتحان
        function endExam() {
            document.getElementById('exam-screen').classList.remove('active');
            document.getElementById('result-screen').classList.add('active');

            const percent = Math.round((score / questionsDB.length) * 100);
            
            document.getElementById('final-score').innerText = score;
            document.getElementById('final-percentage').innerText = percent + "%";
            
            const msgEl = document.getElementById('result-message');
            if(percent >= 90) {
                msgEl.innerHTML = "<span style='color:var(--correct-color)'>ممتاز! مستوى احترافي.</span>";
            } else if (percent >= 70) {
                msgEl.innerHTML = "<span style='color:var(--gold)'>جيد جداً، لديك إلمام قوي بالمادة.</span>";
            } else if (percent >= 50) {
                msgEl.innerHTML = "<span style='color:#f39c12'>مقبول، تحتاج إلى بعض المراجعة.</span>";
            } else {
                msgEl.innerHTML = "<span style='color:var(--wrong-color)'>ضعيف، ننصح بمراجعة الملف المرفق مرة أخرى.</span>";
            }

            // تحديث شريط التقدم للـ 100%
            document.getElementById('progress-bar').style.width = '100%';
        }

        // عرض المراجعة التفصيلية
        function showReview() {
            const reviewList = document.getElementById('review-list');
            reviewList.style.display = 'block';
            reviewList.innerHTML = '<h3>مراجعة الإجابات:</h3><br>';

            questionsDB.forEach((q, index) => {
                const uAnsIdx = userAnswers[index];
                const isCorrect = uAnsIdx === q.correctIndex;
                const statusClass = isCorrect ? 'correct-ans' : 'wrong-ans';
                
                const uAnsText = uAnsIdx !== undefined ? q.options[uAnsIdx] : "لم يتم الإجابة";
                const cAnsText = q.options[q.correctIndex];

                const html = `
                    <div class="review-item ${statusClass}">
                        <div class="review-question">س ${index + 1}: ${q.question}</div>
                        <div class="review-details">
                            <p><strong>إجابتك:</strong> <span style="color:${isCorrect ? 'var(--correct-color)' : 'var(--wrong-color)'}">${uAnsText}</span></p>
                            ${!isCorrect ? `<p><strong>الإجابة الصحيحة:</strong> <span style="color:var(--correct-color)">${cAnsText}</span></p>` : ''}
                            <p style="margin-top:10px; color:#aaa; font-size:0.9rem;"><strong>الشرح:</strong> ${q.explanation}</p>
                        </div>
                    </div>
                `;
                reviewList.innerHTML += html;
            });
            
            // التمرير السلس لقسم المراجعة
            reviewList.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
